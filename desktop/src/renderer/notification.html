<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 12px;
    }

    .hud {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(28, 28, 30, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 14px;
      padding: 12px 16px;
      min-width: 260px;
      max-width: 340px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.28),
        0 2px 8px rgba(0,0,0,0.16),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: slideDown 0.28s cubic-bezier(0.34,1.2,0.64,1) both;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .hud.hide {
      animation: slideUp 0.22s cubic-bezier(0.4,0,1,1) both;
    }

    @keyframes slideUp {
      from { opacity: 1; transform: translateY(0)    scale(1); }
      to   { opacity: 0; transform: translateY(-16px) scale(0.94); }
    }

    .icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 20px;
      height: 20px;
      fill: #ffffff;
    }

    .text {
      flex: 1;
      min-width: 0;
    }

    .from {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 2px;
    }

    .content {
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div class="hud" id="hud">
    <div class="icon-wrap">
      <!-- Clipboard icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2" width="8" height="4" rx="1" ry="1" fill="none" stroke="#fff" stroke-width="2"/>
        <line x1="8" y1="13" x2="16" y2="13" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="17" x2="13" y2="17" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="text">
      <div class="from" id="from">Clipboard</div>
      <div class="content" id="content">Copied to clipboard</div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('from').textContent = params.get('from') || 'Clipboard';
    const text = params.get('text') || '';
    document.getElementById('content').textContent = text.length > 60 ? text.slice(0, 60) + '…' : text;

    setTimeout(() => {
      document.getElementById('hud').classList.add('hide');
    }, 2800);
  </script>
</body>
</html>
